<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Məhsul | Biscela Store</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e53935;
  --dark: #1a1a1a;
  --gray: #6b7280;
  --light: #f8f8f8;
  --border: #e5e7eb;
  --green: #16a34a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto',sans-serif; background:#fff; color:var(--dark); font-size:15px; overflow-x:hidden; }

.topbar {
  background:var(--dark); color:#fff;
  display:flex; justify-content:center; gap:32px;
  padding:9px 20px; font-size:13px; flex-wrap:wrap;
}
.topbar span { display:flex; align-items:center; gap:7px; }
.topbar strong { color:#fbbf24; }

.hero-banner {
  background:linear-gradient(100deg,#1a1a1a 0%,#2d1f1f 50%,#1a1a1a 100%);
  color:#fff; padding:14px 20px; text-align:center;
  font-size:15px; font-weight:700; position:relative; overflow:hidden;
}
.hero-banner::after {
  content:''; position:absolute; top:0; left:-100%;
  width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  animation:sweep 3s infinite;
}
@keyframes sweep { to { left:150%; } }
.hero-banner span { color:#fbbf24; }

.container {
  max-width:1020px; margin:0 auto; padding:32px 16px;
  display:grid; grid-template-columns:1fr 340px; gap:36px; align-items:start;
}

.left h1 { font-size:24px; font-weight:900; margin-bottom:6px; line-height:1.3; }
.subtitle { color:var(--gray); font-size:14px; margin-bottom:28px; display:flex; align-items:center; gap:8px; }
.stars-row { color:#f59e0b; font-size:16px; }

.product-block { margin-bottom:36px; }
.img-wrap {
  width:100%; border-radius:12px; overflow:hidden; margin-bottom:16px;
  background:#f3f4f6; box-shadow:0 4px 24px rgba(0,0,0,0.10); transition:box-shadow 0.3s;
}
.img-wrap:hover { box-shadow:0 8px 36px rgba(0,0,0,0.16); }
.img-wrap img { width:100%; display:block; transition:transform 0.4s ease; }
.img-wrap:hover img { transform:scale(1.02); }
.feature-tag {
  display:inline-flex; align-items:center; gap:6px;
  background:#fef3c7; color:#92400e; border:1px solid #fcd34d;
  padding:4px 12px; border-radius:99px; font-size:12px; font-weight:600; margin-bottom:10px;
}
.product-block p { font-size:15px; color:#374151; line-height:1.8; }
.divider { border:none; border-top:2px solid var(--border); margin:32px 0; }

.how-title { font-size:20px; font-weight:900; margin-bottom:20px; }
.how-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
.how-card {
  background:var(--light); border:1px solid var(--border); border-radius:12px;
  padding:20px 16px; text-align:center; transition:transform 0.2s,box-shadow 0.2s;
}
.how-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
.how-card .hc-icon { font-size:32px; margin-bottom:10px; }
.how-card strong { display:block; font-size:13px; font-weight:700; margin-bottom:5px; }
.how-card p { font-size:12px; color:var(--gray); line-height:1.5; }

/* RIGHT */
.right { position:sticky; top:16px; }
.order-box { border-radius:16px; overflow:hidden; box-shadow:0 8px 40px rgba(0,0,0,0.13); border:1px solid var(--border); }
.order-box-header { background:linear-gradient(135deg,var(--dark) 0%,#2d1a1a 100%); padding:18px 20px 14px; color:#fff; }
.order-box-header h2 { font-size:16px; font-weight:700; line-height:1.4; margin-bottom:10px; }
.badge-row { display:flex; gap:8px; flex-wrap:wrap; }
.badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:6px; font-size:12px; font-weight:700; }
.badge-red { background:var(--red); color:#fff; }
.badge-green { background:#15803d; color:#fff; }
.order-box-body { padding:18px 20px; background:#fff; }

.stock-bar-wrap { margin-bottom:14px; }
.stock-bar-label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px; color:var(--gray); }
.stock-bar-label strong { color:var(--red); }
.stock-bar { height:6px; background:#f3f4f6; border-radius:99px; overflow:hidden; }
.stock-bar-fill { height:100%; width:30%; background:linear-gradient(90deg,var(--red),#ff6b6b); border-radius:99px; animation:pulse-bar 2s infinite; }
@keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:0.7} }

.cd-label { font-size:12px; color:var(--gray); margin-bottom:7px; font-weight:500; }
.countdown-wrap { display:flex; gap:8px; margin-bottom:18px; }
.cd-block { flex:1; background:var(--dark); color:#fff; text-align:center; border-radius:8px; padding:10px 4px 8px; }
.cd-num { display:block; font-size:26px; font-weight:900; line-height:1; }
.cd-sep { font-size:22px; font-weight:900; color:var(--dark); display:flex; align-items:center; padding-bottom:12px; animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.cd-lbl { font-size:10px; color:#9ca3af; text-transform:uppercase; letter-spacing:0.5px; }

.price-section { margin-bottom:18px; }
.price-old { font-size:14px; color:#9ca3af; display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.price-old s { font-size:16px; }
.save-chip { background:#fef2f2; color:var(--red); font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px; }
.price-new { font-size:38px; font-weight:900; color:var(--red); line-height:1; display:flex; align-items:baseline; gap:4px; }
.price-new .currency { font-size:20px; font-weight:700; }
.delivery-chip { display:inline-flex; align-items:center; gap:5px; margin-top:8px; font-size:12px; color:var(--green); font-weight:600; }

.form-group { margin-bottom:10px; position:relative; }
.form-group input {
  width:100%; padding:13px 14px 13px 40px;
  border:1.5px solid var(--border); border-radius:8px;
  font-size:14px; font-family:'Roboto',sans-serif; outline:none;
  transition:border-color 0.2s,box-shadow 0.2s; background:#fafafa;
}
.form-group input:focus { border-color:var(--red); box-shadow:0 0 0 3px rgba(229,57,53,0.10); background:#fff; }
.form-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); font-size:16px; pointer-events:none; }

.order-btn {
  display:flex; align-items:center; justify-content:center; gap:8px;
  width:100%; background:linear-gradient(135deg,var(--red) 0%,#c62828 100%);
  color:#fff; border:none; padding:16px 14px; border-radius:10px;
  font-size:17px; font-weight:700; cursor:pointer; font-family:'Roboto',sans-serif;
  transition:transform 0.15s,box-shadow 0.15s;
  box-shadow:0 6px 20px rgba(229,57,53,0.35); margin-top:4px;
  position:relative; overflow:hidden;
}
.order-btn::after {
  content:''; position:absolute; top:0; left:-100%;
  width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  animation:sweep 2.5s infinite;
}
.order-btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(229,57,53,0.45); }

.trust-row { display:flex; justify-content:center; gap:14px; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
.trust-item { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:11px; color:var(--gray); text-align:center; }
.trust-item span:first-child { font-size:20px; }

.bottom-order { max-width:1020px; margin:0 auto 48px; padding:0 16px; }
.bottom-order .order-box { max-width:500px; }

footer { background:var(--dark); color:rgba(255,255,255,0.45); padding:24px 16px; text-align:center; font-size:12px; line-height:2; }
footer a { color:rgba(255,255,255,0.4); text-decoration:underline; }

.loading-page { min-height:60vh; display:flex; align-items:center; justify-content:center; color:var(--gray); font-size:16px; }

@media(max-width:720px) {
  .container { grid-template-columns:1fr; }
  .right { position:static; order:-1; }
  .how-cards { grid-template-columns:1fr; }
}

@keyframes fadeUp { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="app">
  <div class="loading-page">⏳ Yüklənir...</div>
</div>

<script>
const SUPABASE_URL = 'https://vxlswyadvebtqfftflmt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_obSRm2z3Og9RGg52ONdxIw_yKqtgVjG';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

emailjs.init('GpRKgpqYJkW1eCN_r');

const slug = new URLSearchParams(window.location.search).get('slug');

async function init() {
  // Load settings (pixels)
  const { data: settings } = await sb.from('settings').select('*').limit(1).single();
  if (settings) {
    injectPixels(settings.facebook_pixel, settings.tiktok_pixel);
    if (settings.site_title) document.title = settings.site_title;
  }

  if (!slug) { renderNotFound(); return; }

  const { data: product } = await sb.from('products').select('*').eq('slug', slug).single();
  if (!product) { renderNotFound(); return; }

  renderProduct(product);
}

function injectPixels(fbPixel, ttPixel) {
  if (fbPixel) {
    const s = document.createElement('script');
    s.innerHTML = `!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','${fbPixel}');fbq('track','PageView');`;
    document.head.appendChild(s);
  }
  if (ttPixel) {
    const s = document.createElement('script');
    s.innerHTML = `!function(w,d,t){w.TiktokAnalyticsObject=t;var ttq=w[t]=w[t]||[];ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"],ttq.setAndDefer=function(t,e){t[e]=function(){t.push([e].concat(Array.prototype.slice.call(arguments,0)))}};for(var i=0;i<ttq.methods.length;i++)ttq.setAndDefer(ttq,ttq.methods[i]);ttq.instance=function(t){for(var e=ttq._i[t]||[],n=0;n<ttq.methods.length;n++)ttq.setAndDefer(e,ttq.methods[n]);return e},ttq.load=function(e,n){var i="https://analytics.tiktok.com/i18n/pixel/events.js";ttq._i=ttq._i||{},ttq._i[e]=[],ttq._i[e]._u=i,ttq._r=ttq._r||{},ttq._r[e]=n||{};var o=document.createElement("script");o.type="text/javascript",o.async=!0,o.src=i+"?sdkid="+e+"&lib="+t;var a=document.getElementsByTagName("script")[0];a.parentNode.insertBefore(o,a)};ttq.load('${ttPixel}');ttq.page();}(window,document,'ttq');`;
    document.head.appendChild(s);
  }
}

function renderNotFound() {
  document.getElementById('app').innerHTML = '<div class="loading-page">❌ Məhsul tapılmadı</div>';
}

function renderProduct(p) {
  const discount = p.old_price ? Math.round((1 - p.price/p.old_price)*100) : null;
  const saving = p.old_price ? Math.round(p.old_price - p.price) : null;
  const descs = (p.description || '').split('\n').filter(d => d.trim());
  const images = p.images || [];

  const imageBlocks = images.map((url, i) => `
    <div class="product-block" style="opacity:0;transform:translateY(20px);transition:opacity 0.5s ease ${i*0.08}s,transform 0.5s ease ${i*0.08}s">
      <div class="img-wrap"><img src="${url}" alt="${p.name}" loading="lazy"></div>
      ${descs[i] ? `<div class="feature-tag">✨ Xüsusiyyət</div><p>${descs[i]}</p>` : ''}
    </div>
  `).join('');

  const priceHTML = `
    ${p.old_price ? `<div class="price-old"><s>${p.old_price} AZN</s>${saving ? `<span class="save-chip">${saving} AZN qənaət</span>` : ''}</div>` : ''}
    <div class="price-new"><span class="currency">AZN</span>${p.price}</div>
    <div class="delivery-chip">🚚 Çatdırılma: 3 AZN-dən</div>
  `;

  const orderBoxInner = (nameId, phoneId) => `
    <div class="order-box-header">
      <h2>${p.name}</h2>
      <div class="badge-row">
        ${discount ? `<span class="badge badge-red">🔥 Endirim -${discount}%</span>` : ''}
        <span class="badge badge-green">✅ Stokda var</span>
      </div>
    </div>
    <div class="order-box-body">
      <div class="stock-bar-wrap">
        <div class="stock-bar-label"><span>Aksiya miqdarı</span><strong>Yalnız 8 ədəd qalıb!</strong></div>
        <div class="stock-bar"><div class="stock-bar-fill"></div></div>
      </div>
      <div class="cd-label">⏱ Aksiya bitəcək:</div>
      <div class="countdown-wrap">
        <div class="cd-block"><span class="cd-num" id="h${nameId}">00</span><span class="cd-lbl">Saat</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-block"><span class="cd-num" id="m${nameId}">00</span><span class="cd-lbl">Dəq</span></div>
        <div class="cd-sep">:</div>
        <div class="cd-block"><span class="cd-num" id="s${nameId}">00</span><span class="cd-lbl">San</span></div>
      </div>
      <div class="price-section">${priceHTML}</div>
      <div class="form-group">
        <span class="form-icon">👤</span>
        <input type="text" id="${nameId}" placeholder="Adınız və soyadınız">
      </div>
      <div class="form-group">
        <span class="form-icon">📱</span>
        <input type="tel" id="${phoneId}" placeholder="+994 XX XXX XX XX">
      </div>
      <button class="order-btn" onclick="sendOrder('${nameId}','${phoneId}',this,${p.id})">
        🛒 Endirimli sifariş ver
      </button>
      <div class="trust-row">
        <div class="trust-item"><span>💵</span><span>Qapıda ödəniş</span></div>
        <div class="trust-item"><span>🔒</span><span>Təhlükəsiz</span></div>
        <div class="trust-item"><span>↩️</span><span>Zəmanət</span></div>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <span>🚚 <strong>Çatdırılma</strong> 1–3 iş günü</span>
      <span>💳 <strong>Ödəniş</strong> yalnız qapıda</span>
      <span>✅ <strong>Keyfiyyət</strong> zəmanəti</span>
    </div>
    <div class="hero-banner">
      🔥 Aksiya: <span>-${discount || 0}% endirim</span> — yalnız bu gün etibarlıdır!
    </div>
    <div class="container">
      <div class="left">
        <h1>${p.name}</h1>
        <div class="subtitle">
          <span class="stars-row">★★★★★</span>
          <span style="color:var(--gray);font-size:13px;">4.9 · 238 rəy</span>
        </div>
        ${imageBlocks}
        <hr class="divider">
        <div class="how-title">Necə sifariş vermək · Çatdırılma</div>
        <div class="how-cards">
          <div class="how-card"><div class="hc-icon">📋</div><strong>Formu doldurun</strong><p>Ad və telefon nömrənizi yazın</p></div>
          <div class="how-card"><div class="hc-icon">📞</div><strong>Zəng gözləyin</strong><p>15 dəq ərzində operator sizinlə əlaqə saxlayır</p></div>
          <div class="how-card"><div class="hc-icon">📦</div><strong>Qapıda alın</strong><p>Kuryerdən alıb, ödəyin</p></div>
        </div>
      </div>
      <div class="right">
        <div class="order-box" id="order_form">${orderBoxInner('name1','phone1')}</div>
      </div>
    </div>
    <div class="bottom-order">
      <div class="order-box">${orderBoxInner('name2','phone2')}</div>
    </div>
    <footer>
      <div>Biscela Store &nbsp;·&nbsp; Tel: +994 XX XXX XX XX</div>
      <div style="margin-top:6px;"><a href="#">Məxfilik Siyasəti</a></div>
    </footer>
  `;

  startCountdown();
  animateBlocks();
}

function animateBlocks() {
  setTimeout(() => {
    document.querySelectorAll('.product-block').forEach(el => {
      el.style.opacity = '1';
      el.style.transform = 'translateY(0)';
    });
  }, 100);
}

function startCountdown() {
  const key = 'cd_end_' + slug;
  const saved = sessionStorage.getItem(key);
  let end = saved ? parseInt(saved) : Date.now() + 23*3600*1000;
  if (!saved) sessionStorage.setItem(key, end);

  function tick() {
    const rem = Math.max(0, Math.floor((end - Date.now())/1000));
    const hh = String(Math.floor(rem/3600)).padStart(2,'0');
    const mm = String(Math.floor((rem%3600)/60)).padStart(2,'0');
    const ss = String(rem%60).padStart(2,'0');
    ['hname1','hname2'].forEach(id => { const e=document.getElementById(id); if(e) e.textContent=hh; });
    ['mname1','mname2'].forEach(id => { const e=document.getElementById(id); if(e) e.textContent=mm; });
    ['sname1','sname2'].forEach(id => { const e=document.getElementById(id); if(e) e.textContent=ss; });
  }
  tick();
  setInterval(tick, 1000);
}

async function sendOrder(nameId, phoneId, btn, productId) {
  const name = document.getElementById(nameId).value.trim();
  const phone = document.getElementById(phoneId).value.trim();
  if (!name) { alert('Zəhmət olmasa adınızı yazın!'); return; }
  if (!phone) { alert('Zəhmət olmasa telefon nömrənizi yazın!'); return; }

  btn.disabled = true;
  btn.innerHTML = '⏳ Göndərilir...';

  const now = new Date();
  const date = now.toLocaleDateString('az-AZ') + ' ' + now.toLocaleTimeString('az-AZ');

  // Save to Supabase
  await sb.from('orders').insert([{
    product_id: productId,
    customer_name: name,
    customer_phone: phone,
    status: 'new'
  }]);

  // Send email
  try {
    await emailjs.send('service_e54fo8j', 'template_u9h0zf9', { name, phone, date });
  } catch(e) { console.log('Email error:', e); }

  btn.innerHTML = '✅ Sifariş qəbul edildi!';
  btn.style.background = '#16a34a';
  document.getElementById(nameId).value = '';
  document.getElementById(phoneId).value = '';
  alert('Sifarişiniz qəbul edildi!\n\n15 dəqiqə ərzində sizinlə əlaqə saxlayacağıq. 😊');
}

init();
</script>
</body>
</html>
