<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biscela Store</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Roboto',sans-serif; background:#f3f4f6; color:#1a1a1a; }



.container { max-width:1020px; margin:32px auto; padding:0 16px; }
.page-title { font-size:24px; font-weight:900; margin-bottom:6px; }
.page-sub { color:#6b7280; font-size:14px; margin-bottom:28px; }

.products-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px;
}

.product-card {
  background:#fff; border-radius:14px; overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
  transition:transform 0.2s,box-shadow 0.2s; text-decoration:none; color:inherit;
  display:block;
}
.product-card:hover { transform:translateY(-4px); box-shadow:0 8px 32px rgba(0,0,0,0.13); }

.card-img {
  width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#f0f0f0;
}
.card-img-placeholder {
  width:100%; aspect-ratio:4/3; background:linear-gradient(135deg,#f0f0f0,#e8e8e8);
  display:flex; align-items:center; justify-content:center; font-size:48px; color:#ccc;
}
.card-body { padding:16px; }
.card-name { font-size:15px; font-weight:700; margin-bottom:8px; line-height:1.3; }
.card-price { display:flex; align-items:center; gap:10px; }
.card-price-new { font-size:22px; font-weight:900; color:#e53935; }
.card-price-old { font-size:13px; color:#9ca3af; text-decoration:line-through; }
.card-btn {
  display:block; width:100%; background:#e53935; color:#fff;
  border:none; padding:12px; text-align:center; font-size:14px;
  font-weight:700; cursor:pointer; font-family:'Roboto',sans-serif;
  margin-top:12px; border-radius:8px;
}

.topbar {
  background:#1a1a1a; color:#fff;
  display:flex; justify-content:center; gap:32px;
  padding:9px 20px; font-size:13px; flex-wrap:wrap;
}
.topbar span { display:flex; align-items:center; gap:7px; }
.topbar strong { color:#fbbf24; }

.hero-banner {
  background:linear-gradient(100deg,#1a1a1a 0%,#2d1f1f 50%,#1a1a1a 100%);
  color:#fff; padding:14px 20px; text-align:center;
  font-size:15px; font-weight:700; position:relative; overflow:hidden;
}
.hero-banner::after {
  content:''; position:absolute; top:0; left:-100%;
  width:60%; height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
  animation:sweep 3s infinite;
}
@keyframes sweep { to { left:150%; } }
.hero-banner span { color:#fbbf24; }

.empty { text-align:center; padding:80px 20px; color:#9ca3af; font-size:16px; }

@media(max-width:600px) {
  .topbar { gap:8px; padding:7px 12px; font-size:11px; }
  .hero-banner { font-size:13px; padding:10px 14px; }
  .container { padding:16px 12px; margin:16px auto; }
  .page-title { font-size:20px; }
  .page-sub { font-size:13px; margin-bottom:20px; }
  .products-grid { grid-template-columns:repeat(2, 1fr); gap:12px; }
  .card-body { padding:12px; }
  .card-name { font-size:13px; margin-bottom:6px; }
  .card-price-new { font-size:18px; }
  .card-price-old { font-size:12px; }
  .card-btn { font-size:13px; padding:10px; margin-top:10px; }
}
</style>
</head>
<body>

<div class="topbar">
  <span>🚚 <strong>Çatdırılma</strong> 1–3 iş günü</span>
  <span>💳 <strong>Ödəniş</strong> yalnız qapıda</span>
  <span>✅ <strong>Keyfiyyət</strong> zəmanəti</span>
</div>
<div class="hero-banner">
  🔥 Aksiya: <span>Seçilmiş məhsullarda endirim</span> — yalnız bu gün etibarlıdır!
</div>

<div class="container">
  <h2 class="page-title">Məhsullar</h2>
  <p class="page-sub">Keyfiyyətli məhsullar — qapıda ödəniş</p>
  <div class="products-grid" id="grid">
    <div class="empty">⏳ Yüklənir...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vxlswyadvebtqfftflmt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_obSRm2z3Og9RGg52ONdxIw_yKqtgVjG';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function load() {
  const { data } = await sb.from('products').select('*').order('created_at', { ascending: false });
  const grid = document.getElementById('grid');
  if (!data?.length) { grid.innerHTML = '<div class="empty">Hələ məhsul yoxdur</div>'; return; }
  grid.innerHTML = data.map(p => `
    <a class="product-card" href="product?slug=${p.slug}">
      ${p.images?.[0]
        ? `<img class="card-img" src="${p.images[0]}" alt="${p.name}" loading="lazy">`
        : `<div class="card-img-placeholder">📦</div>`}
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">
          <span class="card-price-new">${p.price} AZN</span>
          ${p.old_price ? `<span class="card-price-old">${p.old_price} AZN</span>` : ''}
        </div>
        <button class="card-btn">Sifariş ver</button>
      </div>
    </a>
  `).join('');
}

load();
</script>
</body>
</html>
